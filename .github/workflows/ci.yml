name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # exiftool is needed by the metadata-tagging tests (issue #12).
      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Install package (editable, with dev extras)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy blurscan

      - name: Pytest
        run: pytest -q
