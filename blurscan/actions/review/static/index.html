<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>blurscan review</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>blurscan review</h1>
    <div class="controls">
      <label>Show
        <select id="filter">
          <option value="flagged">blurry + borderline</option>
          <option value="blurry">blurry</option>
          <option value="borderline">borderline</option>
          <option value="all">all</option>
        </select>
      </label>
      <span id="counts" class="counts"></span>
      <span id="dryrun" class="dryrun" hidden>dry-run</span>
      <button id="apply">Apply decisions</button>
      <button id="done" class="secondary">Done</button>
    </div>
  </header>

  <main id="grid" class="grid" aria-label="image gallery"></main>

  <div id="detail" class="detail" hidden>
    <div class="detail-body">
      <img id="detail-img" alt="">
      <aside class="detail-meta">
        <h2 id="detail-name"></h2>
        <dl id="detail-stats"></dl>
        <div class="decision-buttons">
          <button data-decision="keep">Keep (k)</button>
          <button data-decision="quarantine">Quarantine (x)</button>
          <button data-decision="tag">Tag (t)</button>
        </div>
        <p class="hint">← → navigate · Esc close</p>
      </aside>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
